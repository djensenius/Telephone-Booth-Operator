name: deploy-azure

on:
  workflow_run:
    workflows: ["ci"]
    branches: [main]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: deploy-azure-main
  cancel-in-progress: false

env:
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/telephone-booth-operator-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/telephone-booth-operator-web
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Validate API base URL
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::VITE_API_BASE_URL is empty. Set the VITE_API_BASE_URL or PUBLIC_API_URL repository variable."
            exit 1
          fi
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || vars.PUBLIC_API_URL }}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || vars.PUBLIC_API_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run database migrations
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          MIGRATE_JOB: ${{ vars.AZURE_MIGRATE_JOB }}
        run: |
          set -euo pipefail
          az containerapp job update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MIGRATE_JOB" \
            --image "${API_IMAGE}:${IMAGE_TAG}" \
            --output none

          execution_name="$(
            az containerapp job start \
              --resource-group "$RESOURCE_GROUP" \
              --name "$MIGRATE_JOB" \
              --query name \
              --output tsv
          )"

          for _ in {1..60}; do
            status="$(
              az containerapp job execution show \
                --resource-group "$RESOURCE_GROUP" \
                --name "$MIGRATE_JOB" \
                --job-execution-name "$execution_name" \
                --query properties.status \
                --output tsv
            )"

            case "$status" in
              Succeeded)
                exit 0
                ;;
              Failed|Canceled)
                az containerapp job logs show \
                  --resource-group "$RESOURCE_GROUP" \
                  --name "$MIGRATE_JOB" \
                  --execution "$execution_name" \
                  --container "$MIGRATE_JOB" \
                  --tail 100
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for migration job $execution_name"
          exit 1

      - name: Deploy Container Apps
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_APP: ${{ vars.AZURE_API_APP }}
          WEB_APP: ${{ vars.AZURE_WEB_APP }}
        run: |
          set -euo pipefail
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP" \
            --image "${API_IMAGE}:${IMAGE_TAG}" \
            --min-replicas 1
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP" \
            --image "${WEB_IMAGE}:${IMAGE_TAG}" \
            --min-replicas 1

      - name: Smoke test
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
        run: curl -fsS "${PUBLIC_API_URL}/healthz"
