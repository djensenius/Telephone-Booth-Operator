name: docker
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v0.1.0 or 'latest')."
        required: true
        type: string
      vite-api-base-url:
        description: "Optional API origin baked into the web image, e.g. https://api.example.com."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [api, web]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/${{ matrix.image }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/telephone-booth-operator-${{ matrix.image }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/telephone-booth-operator-${{ matrix.image }}:latest
          build-args: |
            VITE_API_BASE_URL=${{ matrix.image == 'web' && inputs['vite-api-base-url'] || '' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
