services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: booth
      POSTGRES_PASSWORD: booth
      POSTGRES_DB: telephone_booth
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booth -d telephone_booth"]
      interval: 5s
      timeout: 3s
      retries: 20

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: >
      azurite-blob --blobHost 0.0.0.0 --blobPort 10000
      --location /data --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  db_data:
  azurite_data:
