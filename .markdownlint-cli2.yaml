# markdownlint-cli2 configuration shared by all docs/ markdown.
config:
  default: true
  MD013:
    line_length: 120
    code_blocks: false
    tables: false
  MD033:
    allowed_elements:
      - details
      - summary
      - br
      - sub
      - sup
  MD024:
    siblings_only: true
  # Do not require padded/aligned table columns; compact tables are intentional.
  MD060: false
  MD041: false
globs:
  - "docs/**/*.md"
  - "README.md"
ignores:
  - "**/node_modules/**"
  - "**/dist/**"
