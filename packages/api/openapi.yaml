openapi: 3.1.0
info:
  title: Telephone-Booth Operator API
  description: |
    Versioned REST + WebSocket API between the operator console
    (`Telephone-Booth-Operator`) and the phone-side Rust client.

    The phone client authenticates with a static Bearer API token issued from
    the operator UI. Operator browser sessions authenticate via Authentik OIDC
    (cookie session). Native mobile apps in
    `Telephone-Booth-Operator-Mobile` authenticate with Authentik PKCE and send
    the resulting access token as `Authorization: Bearer <jwt>`
    (`operatorBearer` security scheme).
  version: 1.0.0
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8787
    description: Local dev
  - url: https://operator.example.com
    description: Production
tags:
  - name: status
  - name: questions
  - name: messages
  - name: uploads
  - name: auth
  - name: tokens
  - name: transcriptions
  - name: moderations
  - name: stats
paths:
  /healthz:
    get:
      summary: Liveness probe.
      security: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }

  /v1/status:
    get:
      summary: Current booth status as last reported by the phone client.
      tags: [status]
      security: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoothStatus" }
    put:
      summary: Phone client posts a status update.
      tags: [status]
      security:
        - apiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatusUpdate" }
      responses:
        "204": { description: accepted }

  /v1/status/history:
    get:
      summary: Recent booth status snapshots for operator charts.
      tags: [status]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusHistory" }

  /v1/questions:
    get:
      summary: List active questions.
      tags: [questions]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuestionList" }
    post:
      summary: Create a new question from an already-uploaded audio file.
      tags: [questions]
      security:
        - operatorSession: []
        - operatorBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuestionCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Question" }
        "404": { description: audio file not found }
        "409": { description: duplicate prompt or audio already attached }

  /v1/questions/random:
    get:
      summary: A random active question for the phone client to play.
      tags: [questions]
      security:
        - apiToken: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Question" }
        "404": { description: no questions available }

  /v1/questions/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      summary: Soft-delete a question.
      tags: [questions]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "204": { description: removed }
        "404": { description: not found }

  /v1/messages:
    get:
      summary: List messages, filterable by status and creation time.
      tags: [messages]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/MessageStatus" }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageList" }
    post:
      summary: Initiate a message audio upload.
      tags: [messages]
      security:
        - apiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageCreate" }
      responses:
        "201":
          description: upload URL issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageInitiated" }
        "404": { description: question not found }
        "409": { description: duplicate message }

  /v1/messages/random:
    get:
      summary: A random approved message for the phone client to play.
      tags: [messages]
      security:
        - apiToken: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
        "404": { description: no approved messages available }

  /v1/messages/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      summary: Fetch one message.
      tags: [messages]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
        "404": { description: not found }
    delete:
      summary: Delete a message row.
      tags: [messages]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "204": { description: deleted }
        "404": { description: not found }

  /v1/messages/{id}/complete:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      summary: Phone client notifies that the direct blob upload finished.
      tags: [messages]
      security:
        - apiToken: []
      responses:
        "200":
          description: received
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageComplete" }
        "404": { description: not found }
        "409": { description: blob not found }
        "413": { description: audio blob exceeds maximum allowed size }
        "422": { description: "sha256 metadata missing or mismatch" }

  /v1/messages/{id}/transcriptions:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      summary: List all transcription attempts for a message (newest first).
      tags: [transcriptions]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TranscriptionList" }
        "404": { description: message not found }

  /v1/messages/{id}/transcribe:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      summary: Re-run transcription (and downstream moderation) for a message.
      description: |
        Runs the full pipeline synchronously — transcription, then
        moderation against the new transcript, then any configured
        auto-decision — and returns the resulting `Transcription` row.
        The same row (plus the matching `Message` update) is also
        broadcast on `/v1/ws/status` as a `{kind:"message"}` envelope so
        other clients pick up the change without polling. The status is
        `202` to signal that the row may still be of interest to other
        listeners (history queries, the moderation row, the parent
        `Message`), even though the synchronous work is finished.
      tags: [transcriptions]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "202":
          description: transcription attempt recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transcription" }
        "404": { description: message not found }

  /v1/messages/{id}/moderate:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      summary: Re-run moderation against the latest succeeded transcription.
      description: |
        Runs the moderation step (and any configured auto-decision)
        synchronously against the latest succeeded transcription and
        returns the resulting `Moderation` row. The same row is also
        broadcast on `/v1/ws/status` as a `{kind:"message"}` envelope.
      tags: [moderations]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "202":
          description: moderation attempt recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Moderation" }
        "404": { description: message not found }
        "409": { description: no succeeded transcription available to moderate }

  /v1/uploads/sas:
    post:
      summary: Request a presigned Azure Blob upload URL.
      tags: [uploads]
      security:
        - operatorSession: []
        - operatorBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadSasRequest" }
      responses:
        "201":
          description: upload slot issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadSlot" }

  /v1/stats/summary:
    get:
      summary: Aggregated booth status + queue counters for mobile widgets.
      description: |
        Cached aggregation suitable for high-frequency widget polling.
        Returns the latest booth status, message-queue counts (pending,
        received-today, latest id), call counts (today + in-progress), and
        the active WebSocket subscriber count. Cached for 5 seconds on the
        server so 1 request per 15s widget timeline ≈ 0 extra DB load.
      tags: [stats]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "200":
          description: aggregated booth statistics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatsSummary" }
        "401": { description: missing or invalid credentials }

  /v1/auth/login:
    get:
      summary: Begin Authentik OIDC login (Auth-Code + PKCE).
      tags: [auth]
      security: []
      responses:
        "302": { description: redirect to IdP }

  /v1/auth/callback:
    get:
      summary: OIDC callback. Validates code + sets session cookie.
      tags: [auth]
      security: []
      parameters:
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
      responses:
        "302": { description: redirect to UI }

  /v1/auth/logout:
    post:
      summary: Clear session + RP-initiated logout.
      tags: [auth]
      security:
        - operatorSession: []
      responses:
        "302": { description: redirect to IdP logout or UI }

  /v1/auth/me:
    get:
      summary: Current operator profile (driven by ID-token claims).
      tags: [auth]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperatorMe" }

  /v1/api-tokens:
    get:
      summary: List active API tokens (last4 only).
      tags: [tokens]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiToken" }
    post:
      summary: Issue a new API token. Returned in plaintext exactly once.
      tags: [tokens]
      security:
        - operatorSession: []
        - operatorBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApiTokenRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiTokenCreated" }

  /v1/api-tokens/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      summary: Revoke an API token.
      tags: [tokens]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "204": { description: revoked }

  /v1/api-tokens/{id}/usage:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      summary: Return coarse API token usage buckets.
      tags: [tokens]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - name: days
          in: query
          schema: { type: integer, minimum: 1, maximum: 365, default: 30 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiTokenUsageBucket" }

  /v1/jobs/next:
    get:
      summary: Lease the next pending pull-worker job.
      description: |
        The Mac transcription app polls this endpoint every few seconds.
        Returns 200 with a job envelope (kind = transcription | translation
        | moderation) when something is leasable, or 204 when the queue is
        empty. Each successful response issues a fresh `leaseToken` that the
        worker must echo back on /succeed, /fail, or /heartbeat for the same
        job id. Calls authenticate with an operator-issued API token, same
        scheme used by phone clients.
      tags: [jobs]
      security:
        - apiToken: []
      parameters:
        - name: kinds
          in: query
          description: Comma-separated subset (default = all kinds).
          schema: { type: string, example: "transcription,translation,moderation" }
        - name: leaseSeconds
          in: query
          schema: { type: integer, minimum: 10, maximum: 3600, default: 60 }
      responses:
        "200":
          description: A job was leased.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobEnvelope" }
        "204": { description: No pending work. }

  /v1/jobs/{id}/heartbeat:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      summary: Extend the lease on an in-flight job.
      tags: [jobs]
      security:
        - apiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseToken]
              properties:
                leaseToken: { type: string }
                leaseSeconds:
                  { type: integer, minimum: 10, maximum: 3600, default: 60 }
      responses:
        "200":
          description: Lease extended.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  leaseExpiresAt: { type: string, format: date-time }
        "409":
          description:
            Lease lost — another worker re-leased the job or the row is no
            longer pending. Stop work and discard the result.

  /v1/jobs/{id}/succeed:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      summary: Submit a successful job result.
      description: |
        The body shape depends on the job kind encoded in the id prefix
        (`transcription-…`, `translation-…`, or `moderation-…`). All three
        require the `leaseToken` returned by the original /next response.
      tags: [jobs]
      security:
        - apiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/SucceedTranscriptionBody"
                - $ref: "#/components/schemas/SucceedTranslationBody"
                - $ref: "#/components/schemas/SucceedModerationBody"
      responses:
        "200": { description: Result accepted. }
        "409": { description: Lease lost. }

  /v1/jobs/{id}/fail:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      summary: Report that a leased job could not be completed.
      description: |
        Bumps the row's `attemptCount` and clears the lease so the worker (or
        another worker) can re-lease it. After 5 attempts the row is marked
        permanently failed and the response includes `terminal: true`.
      tags: [jobs]
      security:
        - apiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseToken, errorCode]
              properties:
                leaseToken: { type: string }
                errorCode: { type: string, maxLength: 128 }
                errorMessage: { type: string, maxLength: 2000 }
      responses:
        "200":
          description: Failure recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  terminal: { type: boolean }
        "409": { description: Lease lost. }

  /v1/ws/status:
    get:
      summary: WebSocket — operator UI subscribes to live status push.
      description: |
        Operator UIs subscribe over WebSocket; the server fans out a
        discriminated `{kind:"status"|"system"|"message", ...}` envelope. The
        connection is dropped with code 1009 if outbound buffering exceeds
        ~1 MiB (slow consumer guard).
      tags: [status]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "101": { description: switching protocols }
        "426": { description: upgrade required }

  /v1/events:
    post:
      summary: Bulk-ingest booth observability events (idempotent).
      description: |
        Booth → API. Events are deduplicated on `(boothId, eventId)`. Lazily
        creates a `CallSession` when `call_started` / `call_ended` events
        arrive.
      tags: [events]
      security:
        - apiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items: { $ref: "#/components/schemas/BoothEvent" }
                  minItems: 1
                  maxItems: 500
      responses:
        "200":
          description: batch accepted
          content:
            application/json:
              schema:
                type: object
                required: [accepted, duplicates]
                properties:
                  accepted: { type: integer, minimum: 0 }
                  duplicates: { type: integer, minimum: 0 }
        "400": { description: invalid batch (too large or malformed) }
        "401": { description: missing or invalid API token }
    get:
      summary: List booth events (cursor-paginated).
      tags: [events]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - name: boothId
          in: query
          schema: { type: string }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - name: type
          in: query
          schema:
            oneOf:
              - { type: string }
              - { type: array, items: { type: string } }
        - name: sessionId
          in: query
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: events page
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/BoothEventRecord" }
                  nextCursor:
                    type: [string, "null"]

  /v1/events/stream:
    get:
      summary: Server-Sent Events live tail of booth events.
      description: |
        Cookie-only auth (no Bearer token). The same-origin operator UI
        consumes this with `new EventSource(url, { withCredentials: true })`.
      tags: [events]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - { name: boothId, in: query, schema: { type: string } }
        - { name: sessionId, in: query, schema: { type: string, format: uuid } }
        - name: type
          in: query
          schema:
            oneOf:
              - { type: string }
              - { type: array, items: { type: string } }
      responses:
        "200":
          description: SSE stream (text/event-stream)
          content:
            text/event-stream: {}

  /v1/sessions:
    get:
      summary: List call sessions (cursor-paginated).
      tags: [sessions]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - { name: boothId, in: query, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: string } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 500, default: 100 },
          }
      responses:
        "200":
          description: sessions page
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/CallSession" }
                  nextCursor:
                    type: [string, "null"]

  /v1/sessions/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get a single call session with its ordered events.
      tags: [sessions]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "200":
          description: session detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CallSessionDetail" }
        "404": { description: not found }

  /v1/system:
    put:
      summary: Push the latest live system snapshot from a booth.
      description: |
        Booth → API. The operator caches the snapshot in-memory per booth
        and broadcasts a `{kind:"system",...}` envelope on the status WS.
        Historical metrics are owned by VictoriaMetrics (scraped via vmagent),
        so this endpoint does **not** persist to Postgres.
      tags: [system]
      security:
        - apiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [boothId, snapshot]
              properties:
                boothId: { type: string }
                snapshot: { $ref: "#/components/schemas/BoothSystemSnapshot" }
      responses:
        "204": { description: snapshot accepted }
        "401": { description: missing or invalid API token }

  /v1/system/current:
    get:
      summary: Get the latest cached system snapshot for one or all booths.
      tags: [system]
      security:
        - operatorSession: []
        - operatorBearer: []
      parameters:
        - name: boothId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: snapshot or list of snapshots
        "404": { description: no snapshot cached for the given booth }

  /v1/devices:
    get:
      summary: List the caller's mobile devices (active only).
      tags: [devices]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MobileDevice" }
    post:
      summary: Register or refresh a mobile device APNs token for push.
      tags: [devices]
      security:
        - operatorSession: []
        - operatorBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterMobileDeviceRequest" }
      responses:
        "201":
          description: registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MobileDevice" }

  /v1/devices/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      summary: Update per-device notification preferences or display name.
      tags: [devices]
      security:
        - operatorSession: []
        - operatorBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMobileDevicePreferencesRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MobileDevice" }
        "404": { description: not found }
    delete:
      summary: Revoke a mobile device (stops APNs delivery to it).
      tags: [devices]
      security:
        - operatorSession: []
        - operatorBearer: []
      responses:
        "204": { description: revoked }
        "404": { description: not found }

components:
  securitySchemes:
    apiToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Phone-client API token issued from the operator UI.
    operatorSession:
      type: apiKey
      in: cookie
      name: __Host-booth_session
      description: HMAC-signed opaque session cookie set after OIDC login.
    operatorBearer:
      type: http
      scheme: bearer
      bearerFormat: jwt
      description: |
        Authentik-issued JWT access token. Validated against the provider's
        JWKS, issuer, audience (operator web client_id + any configured
        `OIDC_MOBILE_AUDIENCES`), and operator group / email allow-lists.
        Used by native mobile apps that authenticate via PKCE.
  schemas:
    Health:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string }
        time: { type: string, format: date-time }
    JobEnvelope:
      type: object
      required: [id, kind, leaseToken, attempt]
      properties:
        id:
          type: string
          description: "`{kind}-{rowId}` opaque to the worker."
        kind: { type: string, enum: [transcription, translation, moderation] }
        leaseToken: { type: string }
        leaseExpiresAt: { type: [string, "null"], format: date-time }
        attempt: { type: integer, minimum: 1 }
        transcription:
          type: [object, "null"]
          properties:
            messageId: { type: string, format: uuid }
            audioUrl: { type: string, format: uri }
            sha256: { type: string }
            durationMs: { type: [integer, "null"] }
            contentType: { type: [string, "null"] }
            filename: { type: [string, "null"] }
            model: { type: [string, "null"] }
            language: { type: [string, "null"] }
        translation:
          type: [object, "null"]
          properties:
            messageId: { type: string, format: uuid }
            transcriptionId: { type: string, format: uuid }
            text: { type: string }
            sourceLanguage: { type: [string, "null"] }
            targetLanguage: { type: string, default: "en" }
            model: { type: [string, "null"] }
        moderation:
          type: [object, "null"]
          properties:
            messageId: { type: string, format: uuid }
            transcriptionId: { type: [string, "null"], format: uuid }
            text: { type: string }
            model: { type: [string, "null"] }
    SucceedTranscriptionBody:
      type: object
      required: [leaseToken, text]
      properties:
        leaseToken: { type: string }
        text: { type: string }
        language: { type: [string, "null"] }
        model: { type: [string, "null"] }
    SucceedTranslationBody:
      type: object
      required: [leaseToken, translatedText]
      properties:
        leaseToken: { type: string }
        translatedText: { type: string }
        sourceLanguage: { type: [string, "null"] }
        targetLanguage: { type: [string, "null"] }
        model: { type: [string, "null"] }
    SucceedModerationBody:
      type: object
      required: [leaseToken, flagged, recommendation, maxScore]
      properties:
        leaseToken: { type: string }
        flagged: { type: boolean }
        recommendation: { type: string, enum: [approve, review, reject] }
        maxScore: { type: number, minimum: 0, maximum: 1 }
        categories:
          type: object
          additionalProperties: { type: number }
        reasonSummary: { type: string }
        model: { type: [string, "null"] }
    BoothState:
      type: string
      enum:
        [
          idle,
          dialTone,
          dialing,
          playingQuestion,
          beep,
          recording,
          uploading,
          playingMessage,
          playingInstructions,
          error,
        ]
    BoothStatus:
      type: object
      required: [state, updatedAt]
      properties:
        state: { $ref: "#/components/schemas/BoothState" }
        updatedAt: { type: string, format: date-time }
        currentQuestionId: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
        currentMessageId: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
        lastError: { anyOf: [{ type: string }, { type: "null" }] }
    StatusUpdate:
      type: object
      required: [state]
      properties:
        state: { $ref: "#/components/schemas/BoothState" }
        updatedAt: { type: string, format: date-time }
        currentQuestionId: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
        currentMessageId: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
        lastError: { anyOf: [{ type: string }, { type: "null" }] }
    StatusHistory:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/BoothStatus" }
    Sha256:
      type: string
      pattern: "^[a-f0-9]{64}$"
    AudioRef:
      type: object
      required: [url, sha256, durationMs]
      properties:
        url: { type: string, format: uri, description: "Time-bounded read URL." }
        sha256: { $ref: "#/components/schemas/Sha256" }
        durationMs: { anyOf: [{ type: integer, minimum: 1 }, { type: "null" }] }
    Question:
      type: object
      required: [id, prompt, createdAt, audio]
      properties:
        id: { type: string, format: uuid }
        prompt: { type: string, minLength: 1, maxLength: 280 }
        createdAt: { type: string, format: date-time }
        audio: { $ref: "#/components/schemas/AudioRef" }
    QuestionCreate:
      type: object
      required: [prompt, audioFileId]
      properties:
        prompt: { type: string, minLength: 1, maxLength: 280 }
        audioFileId: { type: string, format: uuid }
    QuestionList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Question" }
        nextCursor: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
    MessageStatus:
      type: string
      enum: [uploading, received, pending, approved, rejected]
    Message:
      type: object
      required: [id, status, createdAt, audio]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/MessageStatus" }
        questionId: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
        notes: { anyOf: [{ type: string }, { type: "null" }] }
        createdAt: { type: string, format: date-time }
        receivedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
        audio: { $ref: "#/components/schemas/AudioRef" }
        latestTranscription:
          anyOf:
            - $ref: "#/components/schemas/Transcription"
            - { type: "null" }
        latestModeration:
          anyOf:
            - $ref: "#/components/schemas/Moderation"
            - { type: "null" }
    MessageCreate:
      type: object
      required: [durationMs, sha256]
      properties:
        questionId: { type: string, format: uuid }
        durationMs: { type: integer, minimum: 1, maximum: 300000 }
        sha256: { $ref: "#/components/schemas/Sha256" }
    MessageInitiated:
      type: object
      required: [id, uploadUrl, blobName]
      properties:
        id: { type: string, format: uuid }
        uploadUrl: { type: string, format: uri }
        blobName: { type: string }
    MessageComplete:
      type: object
      required: [id, status, receivedAt]
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [received] }
        receivedAt: { type: string, format: date-time }
    MessageList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Message" }
    UploadSasRequest:
      type: object
      required: [kind, sha256, sizeBytes, contentType]
      properties:
        kind: { type: string, enum: [message, question-audio] }
        sha256: { $ref: "#/components/schemas/Sha256" }
        sizeBytes: { type: integer, minimum: 1 }
        contentType: { type: string, enum: [audio/flac] }
    UploadSlot:
      type: object
      required: [uploadUrl, blobName, expiresAt]
      properties:
        uploadUrl: { type: string, format: uri, description: "Azure Blob PUT URL with SAS." }
        blobName: { type: string }
        expiresAt: { type: string, format: date-time }
        audioFileId:
          { type: string, format: uuid, description: "Present for question-audio uploads." }
    OperatorMe:
      type: object
      required: [id, name, email, groups, providerName]
      properties:
        id: { type: string, description: "Stable Authentik sub" }
        name: { type: string }
        email: { type: string, format: email }
        groups:
          type: array
          items: { type: string }
        picture: { type: string, format: uri }
        providerName: { type: string, description: "OIDC_PROVIDER_NAME — drives UI copy." }
    CreateApiTokenRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        expiresInDays: { type: integer, minimum: 1, maximum: 3650 }
    ApiToken:
      type: object
      required: [id, name, last4, createdAt, expiresAt, lastUsedAt, revokedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        last4: { type: string, minLength: 4, maxLength: 4 }
        createdAt: { type: string, format: date-time }
        expiresAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
        lastUsedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
        revokedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
    ApiTokenCreated:
      allOf:
        - $ref: "#/components/schemas/ApiToken"
        - type: object
          required: [plaintext]
          properties:
            plaintext:
              type: string
              description: "Plaintext token. Shown ONLY on creation. Store securely."
    ApiTokenUsageBucket:
      type: object
      required: [date, count]
      properties:
        date: { type: string }
        count: { type: integer, minimum: 0 }
    BoothEventType:
      type: string
      enum:
        - call_started
        - call_ended
        - digit_dialed
        - state_transition
        - recording_started
        - recording_stopped
        - upload_started
        - upload_completed
        - upload_failed
        - gpio_edge
        - audio_device_change
        - operator_request
        - operator_response
        - error
        - log
        - system_sample
    CallOutcome:
      type: string
      enum:
        - hung_up_before_dial
        - hung_up_during_prompt
        - hung_up_during_recording
        - hung_up_during_upload
        - recording_completed
        - recording_failed
        - upload_failed
        - operator_error
        - aborted
    BoothEvent:
      type: object
      required: [eventId, boothId, bootId, type, occurredAt]
      properties:
        eventId: { type: string, minLength: 1, maxLength: 128 }
        boothId: { type: string, minLength: 1, maxLength: 64 }
        bootId: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/BoothEventType" }
        occurredAt: { type: string, format: date-time }
        sessionId: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
        recordingId: { anyOf: [{ type: string }, { type: "null" }] }
        payload: {}
    BoothEventRecord:
      allOf:
        - $ref: "#/components/schemas/BoothEvent"
        - type: object
          required: [id, receivedAt]
          properties:
            id: { type: string }
            receivedAt: { type: string, format: date-time }
    CallSession:
      type: object
      required:
        [id, boothId, bootId, startedAt, endedAt, digitsDialed, outcome, recordingId, durationMs]
      properties:
        id: { type: string, format: uuid }
        boothId: { type: string }
        bootId: { type: string, format: uuid }
        startedAt: { type: string, format: date-time }
        endedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
        digitsDialed: { anyOf: [{ type: string }, { type: "null" }] }
        outcome:
          anyOf:
            - $ref: "#/components/schemas/CallOutcome"
            - { type: "null" }
        recordingId: { anyOf: [{ type: string }, { type: "null" }] }
        durationMs: { anyOf: [{ type: integer, minimum: 0 }, { type: "null" }] }
    CallSessionDetail:
      allOf:
        - $ref: "#/components/schemas/CallSession"
        - type: object
          required: [events]
          properties:
            events:
              type: array
              items: { $ref: "#/components/schemas/BoothEventRecord" }
    BoothSystemSnapshot:
      type: object
      description: |
        Forward-compatible snapshot of host vitals. Mirrors the Rust
        `booth-hal::SystemSnapshot` struct as emitted on the wire (camelCase).
        Every top-level snapshot field is optional, and unknown extra keys are
        preserved end-to-end so new metrics roll out without breaking older
        operator builds. Note that disk and network *entries* still require
        their identifying field (`mountPoint` / `interface`) and core counters
        — see `BoothDiskStats` / `BoothNetworkStats` below — because an entry
        without those would carry no signal. Adapters that can't supply them
        should omit the entry rather than emit a partial one.
      additionalProperties: true
      properties:
        temperatureCelsius: { type: [number, "null"] }
        uptimeSeconds: { type: [number, "null"], minimum: 0 }
        runtimeMode:
          anyOf:
            - { type: string, enum: [real, mock, simulator] }
            - type: "null"
        cpu:
          anyOf: [{ $ref: "#/components/schemas/BoothCpuStats" }, { type: "null" }]
        memory:
          anyOf: [{ $ref: "#/components/schemas/BoothMemoryStats" }, { type: "null" }]
        disks:
          type: [array, "null"]
          items: { $ref: "#/components/schemas/BoothDiskStats" }
        networks:
          type: [array, "null"]
          items: { $ref: "#/components/schemas/BoothNetworkStats" }
        process:
          anyOf: [{ $ref: "#/components/schemas/BoothProcessStats" }, { type: "null" }]
        audio:
          anyOf: [{ $ref: "#/components/schemas/BoothAudioStats" }, { type: "null" }]
        tailscale:
          anyOf: [{ $ref: "#/components/schemas/BoothTailscaleStats" }, { type: "null" }]
        throttling:
          anyOf: [{ $ref: "#/components/schemas/BoothThrottlingFlags" }, { type: "null" }]
    BoothCpuStats:
      type: object
      additionalProperties: true
      properties:
        usageRatio: { type: [number, "null"], minimum: 0, maximum: 1 }
        perCoreUsageRatio:
          type: [array, "null"]
          items: { type: number, minimum: 0, maximum: 1 }
        physicalCores: { type: [integer, "null"], minimum: 0 }
        loadAvg1m: { type: [number, "null"] }
        loadAvg5m: { type: [number, "null"] }
        loadAvg15m: { type: [number, "null"] }
    BoothMemoryStats:
      type: object
      additionalProperties: true
      properties:
        totalBytes: { type: [number, "null"], minimum: 0 }
        usedBytes: { type: [number, "null"], minimum: 0 }
        swapTotalBytes: { type: [number, "null"], minimum: 0 }
        swapUsedBytes: { type: [number, "null"], minimum: 0 }
    BoothDiskStats:
      type: object
      additionalProperties: true
      required: [mountPoint, totalBytes, availableBytes]
      properties:
        mountPoint: { type: string }
        filesystem: { type: [string, "null"] }
        totalBytes: { type: number, minimum: 0 }
        availableBytes: { type: number, minimum: 0 }
    BoothNetworkStats:
      type: object
      additionalProperties: true
      required: [interface, receiveBytesTotal, transmitBytesTotal]
      properties:
        interface: { type: string }
        receiveBytesTotal: { type: number, minimum: 0 }
        transmitBytesTotal: { type: number, minimum: 0 }
    BoothProcessStats:
      type: object
      additionalProperties: true
      properties:
        residentBytes: { type: [number, "null"], minimum: 0 }
        virtualBytes: { type: [number, "null"], minimum: 0 }
        openFds: { type: [number, "null"], minimum: 0 }
        threads: { type: [number, "null"], minimum: 0 }
        uptimeSeconds: { type: [number, "null"], minimum: 0 }
    BoothAudioStats:
      type: object
      additionalProperties: true
      properties:
        inputDevice: { type: [string, "null"] }
        outputDevice: { type: [string, "null"] }
        sampleRateHz: { type: [integer, "null"], minimum: 0 }
    BoothTailscaleStats:
      type: object
      additionalProperties: true
      properties:
        connected: { type: [boolean, "null"] }
        peerCount: { type: [integer, "null"], minimum: 0 }
        hostname: { type: [string, "null"] }
        exitNode: { type: [string, "null"] }
    BoothThrottlingFlags:
      type: object
      additionalProperties: true
      properties:
        undervoltage: { type: [boolean, "null"] }
        armFreqCapped: { type: [boolean, "null"] }
        throttled: { type: [boolean, "null"] }
        softTempLimit: { type: [boolean, "null"] }
        undervoltageOccurred: { type: [boolean, "null"] }
        throttledOccurred: { type: [boolean, "null"] }
    TranscriptionStatus:
      type: string
      enum: [pending, succeeded, failed]
    ModerationRecommendation:
      type: string
      enum: [approve, review, reject]
    AiProvider:
      type: string
      enum: [openai, mac_app, disabled]
    Transcription:
      type: object
      required: [id, messageId, provider, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        messageId: { type: string, format: uuid }
        provider: { $ref: "#/components/schemas/AiProvider" }
        model: { anyOf: [{ type: string }, { type: "null" }] }
        status: { $ref: "#/components/schemas/TranscriptionStatus" }
        text: { anyOf: [{ type: string }, { type: "null" }] }
        language: { anyOf: [{ type: string }, { type: "null" }] }
        durationMs: { anyOf: [{ type: integer, minimum: 0 }, { type: "null" }] }
        latencyMs: { anyOf: [{ type: integer, minimum: 0 }, { type: "null" }] }
        error: { anyOf: [{ type: string }, { type: "null" }] }
        requestedById: { anyOf: [{ type: string }, { type: "null" }] }
        createdAt: { type: string, format: date-time }
        completedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
    Moderation:
      type: object
      required: [id, messageId, provider, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        messageId: { type: string, format: uuid }
        transcriptionId: { anyOf: [{ type: string, format: uuid }, { type: "null" }] }
        provider: { $ref: "#/components/schemas/AiProvider" }
        model: { anyOf: [{ type: string }, { type: "null" }] }
        status: { $ref: "#/components/schemas/TranscriptionStatus" }
        flagged: { anyOf: [{ type: boolean }, { type: "null" }] }
        recommendation:
          anyOf:
            - $ref: "#/components/schemas/ModerationRecommendation"
            - { type: "null" }
        maxScore: { anyOf: [{ type: number, minimum: 0, maximum: 1 }, { type: "null" }] }
        categories:
          { anyOf: [{ type: object, additionalProperties: { type: number } }, { type: "null" }] }
        reasonSummary: { anyOf: [{ type: string }, { type: "null" }] }
        latencyMs: { anyOf: [{ type: integer, minimum: 0 }, { type: "null" }] }
        error: { anyOf: [{ type: string }, { type: "null" }] }
        requestedById: { anyOf: [{ type: string }, { type: "null" }] }
        createdAt: { type: string, format: date-time }
        completedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
    TranscriptionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Transcription" }
    StatsSummary:
      type: object
      required: [booth, messages, calls, realtime, generatedAt]
      properties:
        booth: { $ref: "#/components/schemas/BoothStatus" }
        messages:
          type: object
          required: [pending, receivedToday, latestId]
          properties:
            pending: { type: integer, minimum: 0 }
            receivedToday: { type: integer, minimum: 0 }
            latestId:
              anyOf:
                - { type: string, format: uuid }
                - { type: "null" }
        calls:
          type: object
          required: [today, inProgress]
          properties:
            today: { type: integer, minimum: 0 }
            inProgress: { type: integer, minimum: 0 }
        realtime:
          type: object
          required: [wsClients]
          properties:
            wsClients: { type: integer, minimum: 0 }
        generatedAt: { type: string, format: date-time }
    MobileDevicePlatform:
      type: string
      enum: [ios, ipados, macos, watchos, visionos, tvos]
    MobileDevicePreferences:
      type: object
      required: [callStarted, messageReceived, messageFlagged, moderationQueueHigh]
      properties:
        callStarted: { type: boolean }
        messageReceived: { type: boolean }
        messageFlagged: { type: boolean }
        moderationQueueHigh: { type: boolean }
    MobileDevice:
      type: object
      required: [id, apnsToken, platform, preferences, registeredAt, lastSeenAt]
      properties:
        id: { type: string, format: uuid }
        apnsToken: { type: string, minLength: 32 }
        platform: { $ref: "#/components/schemas/MobileDevicePlatform" }
        deviceName: { anyOf: [{ type: string }, { type: "null" }] }
        preferences: { $ref: "#/components/schemas/MobileDevicePreferences" }
        registeredAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time }
    RegisterMobileDeviceRequest:
      type: object
      required: [apnsToken, platform]
      properties:
        apnsToken: { type: string, minLength: 32 }
        platform: { $ref: "#/components/schemas/MobileDevicePlatform" }
        deviceName: { type: string }
        preferences:
          type: object
          properties:
            callStarted: { type: boolean }
            messageReceived: { type: boolean }
            messageFlagged: { type: boolean }
            moderationQueueHigh: { type: boolean }
    UpdateMobileDevicePreferencesRequest:
      type: object
      properties:
        deviceName: { anyOf: [{ type: string }, { type: "null" }] }
        preferences:
          type: object
          properties:
            callStarted: { type: boolean }
            messageReceived: { type: boolean }
            messageFlagged: { type: boolean }
            moderationQueueHigh: { type: boolean }
